<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EC — Explore Orbit</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#020210;color:#fff;font-family:'Space Grotesk',sans-serif;overflow:hidden;height:100vh;width:100vw}
canvas{position:fixed;inset:0;pointer-events:none;z-index:2}
#starwrap{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:1}
.sf{position:absolute;top:-30%;left:-30%;width:160%;height:160%;animation:spincw 360s linear infinite}
@keyframes spincw{to{transform:rotate(360deg)}}
@keyframes twinkle{0%,100%{opacity:.85}50%{opacity:.06}}
.blob{position:fixed;border-radius:50%;pointer-events:none;z-index:1;filter:blur(60px);transition:left 1s cubic-bezier(.23,1,.32,1),top 1s cubic-bezier(.23,1,.32,1)}

/* ── EC Center ── lower z than active node (15) ── */
#ec-center{
  position:fixed;transform:translate(-50%,-50%);border-radius:50%;
  background:radial-gradient(circle at 38% 38%,rgba(10,20,55,.97),rgba(2,2,16,1));
  border:1.5px solid rgba(80,200,255,.50);
  display:flex;align-items:center;justify-content:center;
  font-weight:900;letter-spacing:-1.5px;
  text-shadow:0 0 18px rgba(80,200,255,.8);
  animation:sun-pulse 3s ease-in-out infinite;user-select:none;
  /* z-index 15 — active node will be z 60, so service appears IN FRONT of EC */
  z-index:15;
  transition:width .8s cubic-bezier(.23,1,.32,1),height .8s cubic-bezier(.23,1,.32,1),
             font-size .8s cubic-bezier(.23,1,.32,1)
}
@keyframes sun-pulse{
  0%,100%{box-shadow:0 0 32px rgba(80,200,255,.35),0 0 70px rgba(80,200,255,.15)}
  50%    {box-shadow:0 0 52px rgba(80,200,255,.6), 0 0 110px rgba(80,200,255,.28)}
}

/* ── Service nodes ── */
.node{position:fixed;pointer-events:auto;cursor:pointer}
.node-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;transform:translate(-50%,-50%)}
.node-circle{
  border-radius:50%;background:rgba(8,8,28,.92);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:width .7s cubic-bezier(.23,1,.32,1),height .7s cubic-bezier(.23,1,.32,1),
             font-size .7s cubic-bezier(.23,1,.32,1),box-shadow .7s,border-color .5s
}
.node-label{
  font-weight:600;white-space:nowrap;line-height:1;
  text-shadow:0 2px 8px rgba(0,0,0,.95);pointer-events:none;
  transition:font-size .7s cubic-bezier(.23,1,.32,1),opacity .4s
}

/* ── Navbar ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;padding:18px 48px;
  background:rgba(2,2,16,.60);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,.06);
  transition:opacity .85s cubic-bezier(.23,1,.32,1),transform .85s cubic-bezier(.23,1,.32,1)
}
nav.out{opacity:0;transform:translateY(-110%);pointer-events:none}
.logo{font-size:19px;font-weight:800;letter-spacing:-.5px;
  text-shadow:0 0 10px rgba(192,38,211,.9),0 0 24px rgba(192,38,211,.5)}
.nav-links{display:flex;gap:28px;list-style:none}
.nav-links a{color:rgba(255,255,255,.6);text-decoration:none;font-size:14px;font-weight:600}
.btn-cta{background:linear-gradient(135deg,#C026D3,#2563EB);color:#fff;border:none;
  padding:10px 22px;border-radius:12px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit}

/* ── Hero text ── */
#hero-text{
  position:fixed;left:64px;top:50%;transform:translateY(-50%);
  z-index:30;max-width:480px;
  transition:opacity .8s cubic-bezier(.23,1,.32,1),transform .8s cubic-bezier(.23,1,.32,1)
}
#hero-text.out{opacity:0;transform:translateY(-50%) translateX(-80px);pointer-events:none}
.h1{font-size:clamp(34px,4vw,62px);font-weight:900;line-height:1.04;letter-spacing:-2.5px;margin-bottom:20px}
.grad{background:linear-gradient(90deg,#C026D3,#2563EB);-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text}
.sub{font-size:17px;color:rgba(255,255,255,.50);margin-bottom:34px;line-height:1.65}
.bp{background:linear-gradient(135deg,#C026D3,#2563EB);color:#fff;border:none;
  padding:14px 28px;border-radius:14px;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit}
.bg{background:transparent;color:rgba(255,255,255,.65);border:1px solid rgba(255,255,255,.18);
  padding:14px 26px;border-radius:14px;font-weight:600;font-size:15px;cursor:pointer;font-family:inherit}

/* ── Enter Orbit button (hovers over orbit) ── */
#enter-btn{
  position:fixed;z-index:40;transform:translate(-50%,60px);
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.22);
  color:rgba(255,255,255,.90);padding:13px 30px;border-radius:50px;
  font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  cursor:pointer;font-family:inherit;backdrop-filter:blur(10px);
  transition:opacity .8s,background .25s,border-color .25s,
             left .9s cubic-bezier(.23,1,.32,1),top .9s cubic-bezier(.23,1,.32,1)
}
#enter-btn:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.45)}
#enter-btn.out{opacity:0;pointer-events:none}

/* ── Explore UI ── */
#ring-label{
  position:fixed;top:28px;left:50%;transform:translateX(-50%);z-index:110;
  font-size:12px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;white-space:nowrap;
  opacity:0;pointer-events:none;transition:opacity .6s
}
#ring-label.vis{opacity:1}
#svc-info{
  position:fixed;bottom:88px;left:50%;transform:translateX(-50%);
  z-index:110;text-align:center;opacity:0;pointer-events:none;transition:opacity .6s
}
#svc-info.vis{opacity:1}
#svc-name{font-size:26px;font-weight:900;letter-spacing:-.5px;margin-bottom:8px;transition:color .4s}
#svc-desc{font-size:14px;color:rgba(255,255,255,.45);line-height:1.7;max-width:360px;margin:0 auto}
.arr{
  position:fixed;top:50%;z-index:110;background:none;border:none;
  color:rgba(255,255,255,.30);font-size:42px;cursor:pointer;padding:24px;
  transform:translateY(-50%);opacity:0;pointer-events:none;transition:opacity .6s,color .2s
}
.arr.vis{opacity:1;pointer-events:auto}
.arr:hover{color:rgba(255,255,255,.85)}
#arr-l{left:8px}
#arr-r{right:8px}
#svc-num{
  position:fixed;bottom:48px;left:50%;transform:translateX(-50%);z-index:110;
  font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;
  color:rgba(255,255,255,.22);opacity:0;pointer-events:none;transition:opacity .6s
}
#svc-num.vis{opacity:1}
#exit-btn{
  position:fixed;top:20px;right:22px;z-index:200;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);
  color:rgba(255,255,255,.55);padding:8px 18px;border-radius:50px;
  font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  cursor:pointer;font-family:inherit;opacity:0;pointer-events:none;transition:opacity .5s,background .2s
}
#exit-btn.vis{opacity:1;pointer-events:auto}
#exit-btn:hover{background:rgba(255,255,255,.1);color:#fff}
#flash{position:fixed;inset:0;pointer-events:none;opacity:0;z-index:500;
  background:rgba(255,255,255,.04);transition:opacity .18s}
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="starwrap"><div class="sf" id="sf"></div></div>
<div class="blob" id="b1" style="width:520px;height:520px;background:rgba(192,38,211,.11)"></div>
<div class="blob" id="b2" style="width:600px;height:600px;background:rgba(37,99,235,.09)"></div>

<div id="ec-center">EC</div>
<div id="nodes-container"></div>

<nav id="navbar">
  <div class="logo">Effortless Crew</div>
  <ul class="nav-links">
    <li><a href="#">Services</a></li><li><a href="#">Work</a></li>
    <li><a href="#">About</a></li><li><a href="#">Contact</a></li>
  </ul>
  <button class="btn-cta">Get Started</button>
</nav>

<div id="hero-text">
  <div class="h1">WORK LESS<br><span class="grad">GROW FASTER</span><br>DOMINATE.</div>
  <p class="sub">AI-powered production team.<br>Premium content at scale.</p>
  <div style="display:flex;gap:14px">
    <button class="bp">Get Started →</button>
    <button class="bg">See Our Work</button>
  </div>
</div>

<button id="enter-btn" onclick="enterOrbit()">⊕ &nbsp;ENTER ORBIT</button>

<div id="ring-label"></div>
<div id="svc-info"><div id="svc-name"></div><div id="svc-desc"></div></div>
<button class="arr" id="arr-l" onclick="navigate(-1)">‹</button>
<button class="arr" id="arr-r" onclick="navigate(1)">›</button>
<div id="svc-num"></div>
<button id="exit-btn" onclick="exitOrbit()">✕ &nbsp;EXIT</button>
<div id="flash"></div>

<script>
// ═══════════════════════════════════
// DATA
// ═══════════════════════════════════
const SVCS = [
  {name:"YT Automation",    icon:"🤖", orbit:"inner",  angle:0,   desc:"Fully automated YouTube channels at scale"},
  {name:"Scriptwriting",    icon:"✍️",  orbit:"inner",  angle:120, desc:"Compelling scripts that convert and retain viewers"},
  {name:"Short-Form Video", icon:"📱", orbit:"inner",  angle:240, desc:"Viral Reels, Shorts and TikToks that blow up"},
  {name:"Ecommerce Sites",  icon:"🛒", orbit:"middle", angle:0,   desc:"High-converting Shopify and custom storefronts"},
  {name:"Logo Design",      icon:"🎨", orbit:"middle", angle:90,  desc:"Iconic brand marks that people remember"},
  {name:"Portfolio Sites",  icon:"🌐", orbit:"middle", angle:180, desc:"Beautiful portfolios that win clients"},
  {name:"Thumbnails",       icon:"🖼️",  orbit:"middle", angle:270, desc:"Click-worthy thumbnails — always A/B tested"},
  {name:"Social Media Mgmt",icon:"📢", orbit:"outer",  angle:0,   desc:"Growth-focused content strategy and posting"},
  {name:"Trend Research",   icon:"📊", orbit:"outer",  angle:72,  desc:"Data-driven insights on what's blowing up now"},
  {name:"Ad Production",    icon:"📣", orbit:"outer",  angle:144, desc:"High-ROI ad creatives for Meta, TikTok, YouTube"},
  {name:"AI Production",    icon:"⚡", orbit:"outer",  angle:216, desc:"AI-accelerated workflows — faster, cheaper output"},
  {name:"Video Editing",    icon:"🎬", orbit:"outer",  angle:288, desc:"Premium long-form edits with cinematic flair"},
];
const ORB = {
  inner:  {r:170, period:22000, col:[192,38,211],  label:"INNER RING"},
  middle: {r:270, period:36000, col:[167,139,250], label:"MIDDLE RING"},
  outer:  {r:380, period:52000, col:[96,165,250],  label:"OUTER RING"},
};
const ZOOM_EX = {inner:2.6, middle:1.65, outer:1.10};
const TILT_EX = 86 * Math.PI / 180; // low-angle explore tilt
const BASE_ZOOM = 0.70;
const PERSP = 900;

// ═══════════════════════════════════
// STATE
// ═══════════════════════════════════
let phase     = 'hero';
let activeIdx = 0;
let camAngle  = 0, camAngleTgt  = 0;
let camZoom   = BASE_ZOOM, camZoomTgt = BASE_ZOOM;
let camTilt   = 0, camTiltTgt   = 0;     // 0 = top-down, TILT_EX = low camera
let cosT = 1, sinT = 0;                   // updated from camTilt each frame
let oCX, oCY;                             // orbit centre (px)
let oCXTgt, oCYTgt;
let startTime = null;
const angles  = SVCS.map(s => s.angle * Math.PI / 180);

// ═══════════════════════════════════
// PROJECTION  — rotateZ then rotateX
// ═══════════════════════════════════
function project(r, theta) {
  const phi = theta + camAngle;
  const x   =  r * Math.cos(phi);
  const y   =  r * Math.sin(phi) * cosT;
  const z   = -r * Math.sin(phi) * sinT;
  const fov = PERSP / (PERSP - z);
  return {sx: x*fov*camZoom, sy: y*fov*camZoom, depth:z, fov};
}

function normAngle(a){return a - 2*Math.PI*Math.round(a/(2*Math.PI))}
function lerpA(c,t,k){return c + normAngle(t-c)*k}

// ═══════════════════════════════════
// CANVAS
// ═══════════════════════════════════
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
function resize(){
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);

function drawRings(){
  const W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H);
  const ex = phase !== 'hero';
  const keys = ['outer','middle','inner'];
  keys.forEach(k=>{
    const {r,col} = ORB[k];
    const alpha = ex ? .70 : .28;
    const lw    = ex ? 1.8 : 1.2;
    const blur  = ex ? 12  : 4;
    ctx.save();
    ctx.shadowColor = `rgba(${col},${alpha})`;
    ctx.shadowBlur  = blur;
    ctx.strokeStyle = `rgba(${col},${alpha*.9})`;
    ctx.lineWidth   = lw;
    ctx.beginPath();
    for(let d=0;d<=360;d+=2){
      const p = project(r, d*Math.PI/180);
      const x = oCX+p.sx, y = oCY+p.sy;
      d===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.closePath(); ctx.stroke(); ctx.restore();
  });
}

// ═══════════════════════════════════
// NODES
// ═══════════════════════════════════
const nc  = document.getElementById('nodes-container');
const nEl = [], cEl = [], lEl = [];
SVCS.forEach((s,i)=>{
  const c  = ORB[s.orbit].col;
  const el = document.createElement('div');
  el.className = 'node';
  el.innerHTML = `<div class="node-wrap">
    <div class="node-circle" style="border:1.5px solid rgba(${c},.42);box-shadow:0 0 12px rgba(${c},.25)">
      <span>${s.icon}</span>
    </div>
    <span class="node-label" style="color:rgba(255,255,255,.75)">${s.name}</span>
  </div>`;
  el.addEventListener('click', ()=>{ if(phase!=='hero') setActive(i); });
  nc.appendChild(el);
  nEl.push(el); cEl.push(el.querySelector('.node-circle')); lEl.push(el.querySelector('.node-label'));
});

function positionNodes(){
  const ex = phase !== 'hero';
  const sorted = SVCS.map((s,i)=>{
    const p = project(ORB[s.orbit].r, angles[i]);
    return {i,p,s};
  }).sort((a,b)=>a.p.depth-b.p.depth);

  sorted.forEach(({i,p,s},zo)=>{
    const isA = ex && i===activeIdx;
    const c   = ORB[s.orbit].col;
    const maxZ = ORB[s.orbit].r * sinT;
    const relD = sinT > .01 ? (p.depth+maxZ)/(2*maxZ) : .7; // 0=back 1=front

    // Size
    const sz = !ex ? 36 : isA ? 172 : 20;
    const fs = !ex ? 16 : isA ? 68  : 8;
    cEl[i].style.width    = sz+'px';
    cEl[i].style.height   = sz+'px';
    cEl[i].style.fontSize = fs+'px';

    // Glow / border
    if(isA){
      cEl[i].style.border     = `2px solid rgba(${c},.90)`;
      cEl[i].style.boxShadow  = `0 0 55px rgba(${c},1),0 0 100px rgba(${c},.65),0 0 160px rgba(${c},.3),inset 0 0 40px rgba(${c},.10)`;
    } else {
      const ga = !ex ? .28 : relD*.40;
      cEl[i].style.border     = `1.5px solid rgba(${c},${!ex?.42:relD*.55})`;
      cEl[i].style.boxShadow  = `0 0 ${!ex?12:5}px rgba(${c},${ga})`;
    }

    // Label
    lEl[i].style.fontSize = isA ? '14px' : '10px';
    lEl[i].style.opacity  = (!ex || isA) ? '1' : '0';

    // Opacity
    const op = isA ? 1 : !ex ? Math.max(.45,.45+relD*.55) : Math.max(.08, relD*.40);

    el_assign(nEl[i], oCX+p.sx, oCY+p.sy, isA?60:10+zo, op);
  });
}

function el_assign(el, x, y, z, o){
  el.style.left    = x+'px';
  el.style.top     = y+'px';
  el.style.zIndex  = z;
  el.style.opacity = o.toFixed(2);
}

// EC centre
const ecEl = document.getElementById('ec-center');
function updateEC(size){
  ecEl.style.left     = oCX+'px';
  ecEl.style.top      = oCY+'px';
  ecEl.style.width    = size+'px';
  ecEl.style.height   = size+'px';
  ecEl.style.fontSize = (size*.24)+'px';
  ecEl.style.color    = 'rgba(255,255,255,.9)';
}

// ═══════════════════════════════════
// STARS
// ═══════════════════════════════════
(function(){
  function sr(s){let x=Math.sin(s*9301+49297)*233280;return x-Math.floor(x)}
  const sf=document.getElementById('sf');
  for(let i=0;i<72;i++){
    const sz=sr(i*12.1+.3)>.78?2:1;
    const c=i%3===0?'rgba(192,38,211,.65)':i%3===1?'rgba(80,200,255,.55)':'rgba(255,255,255,.48)';
    const d=document.createElement('div');
    d.style.cssText=`position:absolute;border-radius:50%;top:${(sr(i*4.71+1.3)*100).toFixed(2)}%;`
      +`left:${(sr(i*8.93+2.7)*100).toFixed(2)}%;width:${sz}px;height:${sz}px;background:${c};`
      +`animation:twinkle ${(sr(i*2.83+1.1)*5+4).toFixed(1)}s ease-in-out ${(-(sr(i*6.57+3.9)*12)).toFixed(1)}s infinite`;
    sf.appendChild(d);
  }
})();

// ═══════════════════════════════════
// TICK
// ═══════════════════════════════════
function tick(ts){
  if(!startTime){
    startTime=ts;
    // Hero: orbit on right side of screen
    oCX    = window.innerWidth*.64;
    oCY    = window.innerHeight*.50;
    oCXTgt = oCX; oCYTgt = oCY;
    // Enter-orbit button sits below the orbit centre
    const eb=document.getElementById('enter-btn');
    eb.style.left = oCX+'px';
    eb.style.top  = (oCY + ORB.outer.r * BASE_ZOOM + 56)+'px';
    eb.style.transform = 'translate(-50%,0)';
  }
  const el = ts - startTime;

  // Orbit angles
  SVCS.forEach((s,i)=>{
    angles[i] = s.angle*Math.PI/180 + (el/ORB[s.orbit].period)*2*Math.PI;
  });

  // Camera target in explore
  if(phase !== 'hero'){
    camAngleTgt = -Math.PI/2 - angles[activeIdx];
    camZoomTgt  = ZOOM_EX[SVCS[activeIdx].orbit];
    camTiltTgt  = TILT_EX;
  } else {
    camZoomTgt = BASE_ZOOM;
    camTiltTgt = 0;
  }

  // Lerp
  const k = phase==='flying' ? .10 : .08;
  camAngle = lerpA(camAngle, camAngleTgt, k);
  camZoom += (camZoomTgt - camZoom) * (phase==='flying'?.12:.07);
  camTilt += (camTiltTgt - camTilt) * (phase==='flying'?.08:.06);
  cosT = Math.cos(camTilt);
  sinT = Math.sin(camTilt);

  oCX += (oCXTgt - oCX) * .07;
  oCY += (oCYTgt - oCY) * .07;

  // EC size: big in hero, shrinks in explore so service node is clearly bigger
  const ecSz = phase==='hero' ? 108 : 72;
  updateEC(ecSz);

  // Blobs follow orbit centre
  const b1=document.getElementById('b1'), b2=document.getElementById('b2');
  b1.style.left=(oCX-350)+'px'; b1.style.top=(oCY-320)+'px';
  b2.style.left=(oCX-80)+'px';  b2.style.top=(oCY-200)+'px';

  drawRings();
  positionNodes();
  requestAnimationFrame(tick);
}

// ═══════════════════════════════════
// ACTIONS
// ═══════════════════════════════════
function setActive(idx){
  activeIdx=idx;
  const s=SVCS[idx]; const o=ORB[s.orbit];
  document.getElementById('svc-name').textContent=s.name;
  document.getElementById('svc-name').style.color=`rgb(${o.col})`;
  document.getElementById('svc-desc').textContent=s.desc;
  document.getElementById('ring-label').textContent=o.label;
  document.getElementById('ring-label').style.color=`rgba(${o.col},.75)`;
  document.getElementById('svc-num').textContent=`${idx+1}  /  ${SVCS.length}`;
}

let ft=null;
function enterOrbit(){
  phase='flying'; setActive(0);
  document.getElementById('navbar').classList.add('out');
  document.getElementById('hero-text').classList.add('out');
  document.getElementById('enter-btn').classList.add('out');
  oCXTgt = window.innerWidth  * .50;
  oCYTgt = window.innerHeight * .50;
  camZoom *= 1.5; // jump-start for whoosh feel
  clearTimeout(ft);
  ft=setTimeout(()=>{
    phase='explore';
    ['ring-label','svc-info','svc-num','exit-btn'].forEach(id=>
      document.getElementById(id).classList.add('vis'));
    document.getElementById('arr-l').classList.add('vis');
    document.getElementById('arr-r').classList.add('vis');
  }, 1200);
}

function exitOrbit(){
  phase='hero'; camTiltTgt=0; camZoomTgt=BASE_ZOOM; clearTimeout(ft);
  oCXTgt = window.innerWidth*.64; oCYTgt = window.innerHeight*.50;
  document.getElementById('navbar').classList.remove('out');
  document.getElementById('hero-text').classList.remove('out');
  document.getElementById('enter-btn').classList.remove('out');
  ['ring-label','svc-info','svc-num','exit-btn'].forEach(id=>
    document.getElementById(id).classList.remove('vis'));
  document.getElementById('arr-l').classList.remove('vis');
  document.getElementById('arr-r').classList.remove('vis');
}

function navigate(dir){
  setActive((activeIdx+dir+SVCS.length)%SVCS.length);
  const f=document.getElementById('flash');
  f.style.opacity='1'; setTimeout(()=>f.style.opacity='0',160);
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'     && phase!=='hero')    exitOrbit();
  if(e.key==='ArrowRight' && phase==='explore') navigate(1);
  if(e.key==='ArrowLeft'  && phase==='explore') navigate(-1);
  if(e.key==='Enter'      && phase==='hero')    enterOrbit();
});

let tx=null;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX});
document.addEventListener('touchend',e=>{
  if(!tx||phase!=='explore')return;
  if(Math.abs(e.changedTouches[0].clientX-tx)>50) navigate(e.changedTouches[0].clientX<tx?1:-1);
  tx=null;
});

requestAnimationFrame(tick);
</script>
</body>
</html>
