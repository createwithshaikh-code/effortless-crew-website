<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EC — Keyframe Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#020210;color:#fff;font-family:'Space Grotesk',sans-serif;overflow:hidden;
  height:100vh;width:100vw;display:flex;flex-direction:column}

/* ── Canvas area ── */
#viewport{position:relative;flex:1;overflow:hidden;cursor:grab}
#viewport.dragging{cursor:grabbing}
canvas{position:absolute;inset:0;z-index:2;pointer-events:none}
#starwrap{position:absolute;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.sf{position:absolute;top:-30%;left:-30%;width:160%;height:160%;animation:spincw 360s linear infinite}
@keyframes spincw{to{transform:rotate(360deg)}}
@keyframes twinkle{0%,100%{opacity:.8}50%{opacity:.05}}
.blob{position:absolute;border-radius:50%;filter:blur(55px);pointer-events:none;z-index:1}
#ec-center{position:absolute;transform:translate(-50%,-50%);border-radius:50%;
  background:radial-gradient(circle at 38% 38%,rgba(10,20,55,.97),rgba(2,2,16,1));
  border:1.5px solid rgba(80,200,255,.5);
  display:flex;align-items:center;justify-content:center;
  font-weight:900;letter-spacing:-1.5px;text-shadow:0 0 18px rgba(80,200,255,.8);
  animation:spulse 3s ease-in-out infinite;z-index:15;user-select:none;
  font-size:22px;width:90px;height:90px}
@keyframes spulse{
  0%,100%{box-shadow:0 0 30px rgba(80,200,255,.35),0 0 65px rgba(80,200,255,.15)}
  50%{box-shadow:0 0 50px rgba(80,200,255,.6),0 0 100px rgba(80,200,255,.28)}}
.node{position:absolute;z-index:20;pointer-events:none}
.node-wrap{display:flex;align-items:center;gap:7px;transform:translate(-50%,-50%)}
.node-circle{border-radius:50%;background:rgba(8,8,28,.92);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;
  width:30px;height:30px;border:1.5px solid}
.node-label{font-size:11px;font-weight:600;color:rgba(255,255,255,.72);
  white-space:nowrap;text-shadow:0 1px 6px rgba(0,0,0,.9)}

/* ── Hint overlay ── */
#hint{position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:200;
  font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:rgba(255,255,255,.3);pointer-events:none;white-space:nowrap}

/* ── Controls Panel ── */
#panel{
  position:absolute;top:0;right:0;bottom:140px;width:260px;z-index:300;
  background:rgba(4,4,20,.92);border-left:1px solid rgba(255,255,255,.08);
  overflow-y:auto;padding:12px 0;backdrop-filter:blur(20px)
}
#panel::-webkit-scrollbar{width:4px}
#panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.sec{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.06)}
.sec-title{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(255,255,255,.35);margin-bottom:10px;display:flex;align-items:center;
  justify-content:space-between}
.ctrl{margin-bottom:8px}
.ctrl label{font-size:11px;font-weight:600;color:rgba(255,255,255,.55);
  display:flex;justify-content:space-between;margin-bottom:4px}
.ctrl label span{color:rgba(255,255,255,.9);font-weight:700}
input[type=range]{width:100%;height:4px;-webkit-appearance:none;appearance:none;
  background:rgba(255,255,255,.12);border-radius:2px;cursor:pointer;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;
  border-radius:50%;background:#C026D3;cursor:pointer;box-shadow:0 0 6px rgba(192,38,211,.6)}
.pause-btn{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);
  color:rgba(255,255,255,.6);padding:3px 8px;border-radius:4px;cursor:pointer;
  font-family:inherit;transition:background .2s,color .2s}
.pause-btn.paused{background:rgba(192,38,211,.2);border-color:rgba(192,38,211,.4);
  color:rgba(255,255,255,.9)}
#btn-copy{width:calc(100% - 28px);margin:12px 14px 4px;
  background:linear-gradient(135deg,#C026D3,#2563EB);border:none;color:#fff;
  padding:10px;border-radius:10px;font-weight:700;font-size:12px;letter-spacing:.06em;
  text-transform:uppercase;cursor:pointer;font-family:inherit}
#btn-copy:active{opacity:.8}

/* ── Timeline ── */
#timeline{
  height:140px;background:rgba(4,4,22,.95);
  border-top:1px solid rgba(255,255,255,.08);
  display:flex;flex-direction:column;
  padding-right:260px /* leave room for panel */
}
#tl-track{
  position:relative;flex:1;margin:10px 16px 0;
  background:rgba(255,255,255,.04);border-radius:4px;cursor:pointer;
  overflow:visible
}
#tl-fill{position:absolute;left:0;top:0;bottom:0;
  background:rgba(192,38,211,.12);border-radius:4px;pointer-events:none}
#tl-playhead{position:absolute;top:-6px;bottom:-4px;width:2px;
  background:#C026D3;pointer-events:none;z-index:10;
  box-shadow:0 0 8px rgba(192,38,211,.8)}
#tl-playhead::before{content:'';position:absolute;top:-1px;left:-4px;
  width:10px;height:10px;border-radius:50%;background:#C026D3;
  box-shadow:0 0 8px rgba(192,38,211,.8)}
.kf-marker{position:absolute;top:50%;width:12px;height:12px;border-radius:50%;
  background:#fff;transform:translate(-50%,-50%);cursor:pointer;z-index:5;
  border:2px solid rgba(0,0,0,.5);transition:transform .15s,box-shadow .15s}
.kf-marker:hover{transform:translate(-50%,-50%) scale(1.4)}
.kf-marker.selected{transform:translate(-50%,-50%) scale(1.3);
  box-shadow:0 0 10px rgba(255,255,255,.8)}
.kf-marker.kf-inner {background:#C026D3}
.kf-marker.kf-middle{background:#A78BFA}
.kf-marker.kf-outer {background:#60A5FA}
.kf-marker.kf-mixed {background:#fff}
/* ruler ticks */
.tick{position:absolute;bottom:0;transform:translateX(-50%);pointer-events:none}
.tick-line{width:1px;background:rgba(255,255,255,.12);margin:0 auto}
.tick-label{font-size:9px;color:rgba(255,255,255,.3);text-align:center;margin-top:2px;
  font-family:'Space Grotesk',sans-serif}
/* controls bar */
#tl-controls{display:flex;align-items:center;gap:8px;padding:8px 16px}
.tl-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
  color:rgba(255,255,255,.75);padding:6px 14px;border-radius:6px;
  font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  cursor:pointer;font-family:inherit;transition:background .2s,color .2s;white-space:nowrap}
.tl-btn:hover{background:rgba(255,255,255,.12);color:#fff}
.tl-btn.primary{background:linear-gradient(135deg,rgba(192,38,211,.3),rgba(37,99,235,.3));
  border-color:rgba(192,38,211,.4);color:#fff}
.tl-btn.danger{background:rgba(220,38,38,.15);border-color:rgba(220,38,38,.3);
  color:rgba(255,100,100,.9)}
#time-display{font-size:13px;font-weight:800;color:rgba(255,255,255,.9);
  letter-spacing:.05em;min-width:52px;text-align:right;margin-left:auto}
#kf-count{font-size:11px;color:rgba(255,255,255,.35);white-space:nowrap}
</style>
</head>
<body>

<div id="viewport">
  <canvas id="canvas"></canvas>
  <div id="starwrap"><div class="sf" id="sf"></div></div>
  <div class="blob" id="b1" style="width:480px;height:480px;background:rgba(192,38,211,.12)"></div>
  <div class="blob" id="b2" style="width:560px;height:560px;background:rgba(37,99,235,.09)"></div>
  <div id="ec-center">EC</div>
  <div id="nodes-container"></div>
  <div id="hint">Drag to rotate &nbsp;·&nbsp; Shift+drag to pan &nbsp;·&nbsp; Scroll to zoom</div>
</div>

<!-- ── Controls Panel ── -->
<div id="panel">
  <div class="sec">
    <div class="sec-title">CAMERA</div>
    <div class="ctrl">
      <label>Scale <span id="v-zoom">600</span></label>
      <input type="range" id="sl-zoom" min="0" max="1500" value="600">
    </div>
    <div class="ctrl">
      <label>X Position <span id="v-x">0</span></label>
      <input type="range" id="sl-x" min="-600" max="600" value="0">
    </div>
    <div class="ctrl">
      <label>Y Position <span id="v-y">0</span></label>
      <input type="range" id="sl-y" min="-600" max="600" value="0">
    </div>
    <div class="ctrl">
      <label>Tilt (0°=top · 90°=side) <span id="v-tilt">0°</span></label>
      <input type="range" id="sl-tilt" min="0" max="90" value="0">
    </div>
    <div class="ctrl">
      <label>Rotation <span id="v-rot">0°</span></label>
      <input type="range" id="sl-rot" min="-180" max="180" value="0">
    </div>
  </div>

  <div class="sec" id="sec-inner">
    <div class="sec-title" style="color:rgba(192,38,211,.8)">
      INNER RING
      <button class="pause-btn" id="pb-inner" onclick="togglePause('inner')">⏸ PAUSE</button>
    </div>
    <div class="ctrl">
      <label>Ring Position <span id="v-inner">0°</span></label>
      <input type="range" id="sl-inner" min="0" max="360" value="0">
    </div>
  </div>

  <div class="sec" id="sec-middle">
    <div class="sec-title" style="color:rgba(167,139,250,.9)">
      MIDDLE RING
      <button class="pause-btn" id="pb-middle" onclick="togglePause('middle')">⏸ PAUSE</button>
    </div>
    <div class="ctrl">
      <label>Ring Position <span id="v-middle">0°</span></label>
      <input type="range" id="sl-middle" min="0" max="360" value="0">
    </div>
  </div>

  <div class="sec" id="sec-outer">
    <div class="sec-title" style="color:rgba(96,165,250,.9)">
      OUTER RING
      <button class="pause-btn" id="pb-outer" onclick="togglePause('outer')">⏸ PAUSE</button>
    </div>
    <div class="ctrl">
      <label>Ring Position <span id="v-outer">0°</span></label>
      <input type="range" id="sl-outer" min="0" max="360" value="0">
    </div>
  </div>

  <button id="btn-copy" onclick="copyJSON()">📋 Copy Animation JSON</button>
</div>

<!-- ── Timeline ── -->
<div id="timeline">
  <div id="tl-track" id="tl-track">
    <div id="tl-fill"></div>
    <div id="tl-playhead"></div>
    <!-- ruler + keyframes injected by JS -->
  </div>
  <div id="tl-controls">
    <button class="tl-btn primary" onclick="addKeyframe()">+ ADD KF</button>
    <button class="tl-btn danger"  onclick="deleteKeyframe()">✕ DEL</button>
    <button class="tl-btn" onclick="prevKeyframe()">◄◄ PREV</button>
    <button class="tl-btn" id="btn-play" onclick="togglePlay()">► PLAY</button>
    <button class="tl-btn" onclick="stopPlayback()">■ STOP</button>
    <button class="tl-btn" onclick="nextKeyframe()">NEXT ►►</button>
    <span id="kf-count">0 keyframes</span>
    <span id="time-display">0.0s</span>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════
const SVCS = [
  {name:"YT Automation",    icon:"🤖", orbit:"inner",  angle:0},
  {name:"Scriptwriting",    icon:"✍️",  orbit:"inner",  angle:120},
  {name:"Short-Form Video", icon:"📱", orbit:"inner",  angle:240},
  {name:"Ecommerce Sites",  icon:"🛒", orbit:"middle", angle:0},
  {name:"Logo Design",      icon:"🎨", orbit:"middle", angle:90},
  {name:"Portfolio Sites",  icon:"🌐", orbit:"middle", angle:180},
  {name:"Thumbnails",       icon:"🖼️",  orbit:"middle", angle:270},
  {name:"Social Media",     icon:"📢", orbit:"outer",  angle:0},
  {name:"Trend Research",   icon:"📊", orbit:"outer",  angle:72},
  {name:"Ad Production",    icon:"📣", orbit:"outer",  angle:144},
  {name:"AI Production",    icon:"⚡", orbit:"outer",  angle:216},
  {name:"Video Editing",    icon:"🎬", orbit:"outer",  angle:288},
];
const ORB = {
  inner:  {r:160, period:22000, col:[192,38,211]},
  middle: {r:265, period:36000, col:[167,139,250]},
  outer:  {r:375, period:52000, col:[96,165,250]},
};
const PERSP = 900;
const DURATION = 20; // timeline seconds

// ═══════════════════════════════════════════════
// VIEW STATE  (what the camera sees right now)
// ═══════════════════════════════════════════════
const V = {
  camAngle: 0,   // horizontal orbit rotation (rad)
  camTilt:  0,   // 0=top-down, PI/2=side (rad)
  camZoom:  0.6, // scale
  offsetX:  0,   // px from viewport centre
  offsetY:  0,
};

const RING_STATE = {
  inner:  {paused:false, offset:0, extraOffset:0},
  middle: {paused:false, offset:0, extraOffset:0},
  outer:  {paused:false, offset:0, extraOffset:0},
};

let cosT = 1, sinT = 0;
let oCX  = 0, oCY = 0; // current orbit centre in px
let startTime = null;
const angles = SVCS.map(s => s.angle * Math.PI/180);

// ═══════════════════════════════════════════════
// KEYFRAMES
// ═══════════════════════════════════════════════
let keyframes   = [];   // [{id, time, state}]
let selectedKF  = null;
let currentTime = 0;    // seconds
let playing     = false;
let playWallStart = null;
let playTimeStart = 0;
let kfIdCounter = 0;

function captureState() {
  return {
    camAngle: V.camAngle,
    camTilt:  V.camTilt,
    camZoom:  V.camZoom,
    offsetX:  V.offsetX,
    offsetY:  V.offsetY,
    inner:  RING_STATE.inner.extraOffset,
    middle: RING_STATE.middle.extraOffset,
    outer:  RING_STATE.outer.extraOffset,
  };
}

function applyState(s) {
  V.camAngle = s.camAngle;
  V.camTilt  = s.camTilt;
  V.camZoom  = s.camZoom;
  V.offsetX  = s.offsetX;
  V.offsetY  = s.offsetY;
  RING_STATE.inner.extraOffset  = s.inner  ?? 0;
  RING_STATE.middle.extraOffset = s.middle ?? 0;
  RING_STATE.outer.extraOffset  = s.outer  ?? 0;
  syncSlidersFromV();
}

function lerp(a,b,t){return a+(b-a)*t}
function lerpAngle(a,b,t){
  let d=b-a; d-=Math.round(d/(2*Math.PI))*2*Math.PI; return a+d*t;
}
function stateAtTime(t) {
  const kfs = [...keyframes].sort((a,b)=>a.time-b.time);
  if(!kfs.length) return captureState();
  if(t<=kfs[0].time) return {...kfs[0].state};
  if(t>=kfs[kfs.length-1].time) return {...kfs[kfs.length-1].state};
  for(let i=0;i<kfs.length-1;i++){
    if(t>=kfs[i].time && t<=kfs[i+1].time){
      const a=(t-kfs[i].time)/(kfs[i+1].time-kfs[i].time);
      const s1=kfs[i].state, s2=kfs[i+1].state;
      return {
        camAngle: lerpAngle(s1.camAngle,s2.camAngle,a),
        camTilt:  lerp(s1.camTilt, s2.camTilt, a),
        camZoom:  lerp(s1.camZoom, s2.camZoom, a),
        offsetX:  lerp(s1.offsetX, s2.offsetX, a),
        offsetY:  lerp(s1.offsetY, s2.offsetY, a),
        inner:    lerpAngle(s1.inner,  s2.inner,  a),
        middle:   lerpAngle(s1.middle, s2.middle, a),
        outer:    lerpAngle(s1.outer,  s2.outer, a),
      };
    }
  }
  return captureState();
}

// ═══════════════════════════════════════════════
// PROJECTION
// ═══════════════════════════════════════════════
function project(r, theta) {
  const phi = theta + V.camAngle;
  const x   =  r * Math.cos(phi);
  const y   =  r * Math.sin(phi) * cosT;
  const z   = -r * Math.sin(phi) * sinT;
  const fov = PERSP / (PERSP - z);
  return {sx: x*fov*V.camZoom, sy: y*fov*V.camZoom, depth:z};
}

// ═══════════════════════════════════════════════
// CANVAS
// ═══════════════════════════════════════════════
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
function resize() {
  const vp = document.getElementById('viewport');
  canvas.width  = vp.offsetWidth;
  canvas.height = vp.offsetHeight;
  oCX = canvas.width/2  + V.offsetX;
  oCY = canvas.height/2 + V.offsetY;
}
window.addEventListener('resize', resize);

function drawRings() {
  const W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H);
  oCX = W/2 + V.offsetX;
  oCY = H/2 + V.offsetY;

  // Update EC and blobs
  const ec = document.getElementById('ec-center');
  ec.style.left = oCX+'px'; ec.style.top = oCY+'px';
  document.getElementById('b1').style.cssText+=`;left:${oCX-340}px;top:${oCY-300}px`;
  document.getElementById('b2').style.cssText+=`;left:${oCX-60}px;top:${oCY-180}px`;

  ['outer','middle','inner'].forEach(k=>{
    const {r,col}=ORB[k];
    ctx.save();
    ctx.shadowColor=`rgba(${col},.85)`;ctx.shadowBlur=8;
    ctx.strokeStyle=`rgba(${col},.55)`;ctx.lineWidth=1.5;
    ctx.beginPath();
    for(let d=0;d<=360;d+=2){
      const p=project(r,d*Math.PI/180);
      const x=oCX+p.sx,y=oCY+p.sy;
      d===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.closePath();ctx.stroke();ctx.restore();
  });
}

function positionNodes() {
  const sorted=SVCS.map((s,i)=>{
    const p=project(ORB[s.orbit].r, angles[i]);
    return {i,p,s};
  }).sort((a,b)=>a.p.depth-b.p.depth);

  sorted.forEach(({i,p,s},zo)=>{
    const el=nodeEls[i];
    const c=ORB[s.orbit].col;
    const maxZ=ORB[s.orbit].r*sinT;
    const relD=sinT>.01?(p.depth+maxZ)/(2*maxZ):.7;
    const op=Math.max(.3,.3+relD*.7);
    el.style.left=(oCX+p.sx)+'px';
    el.style.top =(oCY+p.sy)+'px';
    el.style.zIndex=20+zo;
    el.style.opacity=op.toFixed(2);
  });
}

// ═══════════════════════════════════════════════
// BUILD NODES
// ═══════════════════════════════════════════════
const nc=document.getElementById('nodes-container');
const nodeEls=[];
SVCS.forEach((s,i)=>{
  const c=ORB[s.orbit].col;
  const el=document.createElement('div');
  el.className='node';
  el.innerHTML=`<div class="node-wrap">
    <div class="node-circle" style="border-color:rgba(${c},.5);
      box-shadow:0 0 10px rgba(${c},.3)"><span>${s.icon}</span></div>
    <span class="node-label">${s.name}</span>
  </div>`;
  nc.appendChild(el);nodeEls.push(el);
});

// ═══════════════════════════════════════════════
// STARS
// ═══════════════════════════════════════════════
(function(){
  function sr(s){let x=Math.sin(s*9301+49297)*233280;return x-Math.floor(x)}
  const sf=document.getElementById('sf');
  for(let i=0;i<70;i++){
    const sz=sr(i*12.1+.3)>.78?2:1;
    const c=i%3===0?'rgba(192,38,211,.6)':i%3===1?'rgba(80,200,255,.5)':'rgba(255,255,255,.45)';
    const d=document.createElement('div');
    d.style.cssText=`position:absolute;border-radius:50%;top:${(sr(i*4.71+1.3)*100).toFixed(2)}%;`
      +`left:${(sr(i*8.93+2.7)*100).toFixed(2)}%;width:${sz}px;height:${sz}px;background:${c};`
      +`animation:twinkle ${(sr(i*2.83+1.1)*5+4).toFixed(1)}s ease-in-out ${(-(sr(i*6.57+3.9)*12)).toFixed(1)}s infinite`;
    sf.appendChild(d);
  }
})();

// ═══════════════════════════════════════════════
// MOUSE INTERACTION
// ═══════════════════════════════════════════════
let drag={active:false,sx:0,sy:0,shift:false};
const vp=document.getElementById('viewport');

vp.addEventListener('mousedown',e=>{
  drag={active:true,sx:e.clientX,sy:e.clientY,shift:e.shiftKey,
        startAngle:V.camAngle,startTilt:V.camTilt,startX:V.offsetX,startY:V.offsetY};
  vp.classList.add('dragging');
});
window.addEventListener('mousemove',e=>{
  if(!drag.active)return;
  const dx=e.clientX-drag.sx, dy=e.clientY-drag.sy;
  if(drag.shift){
    V.offsetX=drag.startX+dx;
    V.offsetY=drag.startY+dy;
    document.getElementById('sl-x').value=Math.round(V.offsetX);
    document.getElementById('sl-y').value=Math.round(V.offsetY);
    document.getElementById('v-x').textContent=Math.round(V.offsetX);
    document.getElementById('v-y').textContent=Math.round(V.offsetY);
  } else {
    V.camAngle=drag.startAngle+dx*0.008;
    V.camTilt =Math.max(0,Math.min(Math.PI/2,drag.startTilt+dy*0.008));
    const tDeg=Math.round(V.camTilt*180/Math.PI);
    const rDeg=Math.round(((V.camAngle%(2*Math.PI))*180/Math.PI+360)%360-180);
    document.getElementById('sl-tilt').value=tDeg;
    document.getElementById('sl-rot').value =rDeg;
    document.getElementById('v-tilt').textContent=tDeg+'°';
    document.getElementById('v-rot').textContent =rDeg+'°';
  }
});
window.addEventListener('mouseup',()=>{drag.active=false;vp.classList.remove('dragging')});
vp.addEventListener('wheel',e=>{
  e.preventDefault();
  const delta=e.deltaY>0?-30:30;
  const newVal=Math.max(0,Math.min(1500,parseInt(document.getElementById('sl-zoom').value)+delta));
  document.getElementById('sl-zoom').value=newVal;
  V.camZoom=newVal/250;
  document.getElementById('v-zoom').textContent=newVal;
},{passive:false});

// ═══════════════════════════════════════════════
// SLIDERS → VIEW
// ═══════════════════════════════════════════════
function bindSlider(id,valId,fn){
  document.getElementById(id).addEventListener('input',function(){
    document.getElementById(valId).textContent=this.value+(valId.startsWith('v-tilt')||valId.startsWith('v-rot')||valId.startsWith('v-inner')||valId.startsWith('v-middle')||valId.startsWith('v-outer')?'°':'');
    fn(parseFloat(this.value));
  });
}
bindSlider('sl-zoom','v-zoom', v=>{V.camZoom=v/250});
bindSlider('sl-x',  'v-x',    v=>{V.offsetX=v});
bindSlider('sl-y',  'v-y',    v=>{V.offsetY=v});
bindSlider('sl-tilt','v-tilt',v=>{V.camTilt=v*Math.PI/180});
bindSlider('sl-rot', 'v-rot', v=>{V.camAngle=v*Math.PI/180});
bindSlider('sl-inner', 'v-inner', v=>{RING_STATE.inner.extraOffset=v*Math.PI/180});
bindSlider('sl-middle','v-middle',v=>{RING_STATE.middle.extraOffset=v*Math.PI/180});
bindSlider('sl-outer', 'v-outer', v=>{RING_STATE.outer.extraOffset=v*Math.PI/180});

function syncSlidersFromV(){
  const zoom=Math.round(V.camZoom*250);
  document.getElementById('sl-zoom').value=zoom;
  document.getElementById('v-zoom').textContent=zoom;
  document.getElementById('sl-x').value=Math.round(V.offsetX);
  document.getElementById('v-x').textContent=Math.round(V.offsetX);
  document.getElementById('sl-y').value=Math.round(V.offsetY);
  document.getElementById('v-y').textContent=Math.round(V.offsetY);
  const td=Math.round(V.camTilt*180/Math.PI);
  const rd=Math.round(((V.camAngle%(2*Math.PI))*180/Math.PI+360)%360-180);
  document.getElementById('sl-tilt').value=td;document.getElementById('v-tilt').textContent=td+'°';
  document.getElementById('sl-rot').value=rd; document.getElementById('v-rot').textContent=rd+'°';
  const id=Math.round(RING_STATE.inner.extraOffset*180/Math.PI);
  const md=Math.round(RING_STATE.middle.extraOffset*180/Math.PI);
  const od=Math.round(RING_STATE.outer.extraOffset*180/Math.PI);
  document.getElementById('sl-inner').value=((id%360)+360)%360;
  document.getElementById('v-inner').textContent=((id%360)+360)%360+'°';
  document.getElementById('sl-middle').value=((md%360)+360)%360;
  document.getElementById('v-middle').textContent=((md%360)+360)%360+'°';
  document.getElementById('sl-outer').value=((od%360)+360)%360;
  document.getElementById('v-outer').textContent=((od%360)+360)%360+'°';
}

function togglePause(ring){
  RING_STATE[ring].paused=!RING_STATE[ring].paused;
  const btn=document.getElementById('pb-'+ring);
  btn.classList.toggle('paused',RING_STATE[ring].paused);
  btn.textContent=RING_STATE[ring].paused?'▶ PLAY':'⏸ PAUSE';
}

// ═══════════════════════════════════════════════
// TIMELINE  UI
// ═══════════════════════════════════════════════
const track=document.getElementById('tl-track');

function buildRuler(){
  // Remove old ticks
  track.querySelectorAll('.tick').forEach(t=>t.remove());
  const W=track.offsetWidth;
  for(let s=0;s<=DURATION;s++){
    const t=document.createElement('div');
    t.className='tick';
    t.style.left=(s/DURATION*100)+'%';
    const h=s%5===0?18:s%2===0?10:6;
    t.innerHTML=`<div class="tick-line" style="height:${h}px"></div>`
      +(s%5===0?`<div class="tick-label">${s}s</div>`:'');
    track.appendChild(t);
  }
}

function renderKFMarkers(){
  track.querySelectorAll('.kf-marker').forEach(m=>m.remove());
  keyframes.forEach(kf=>{
    const m=document.createElement('div');
    m.className='kf-marker kf-mixed';
    m.style.left=(kf.time/DURATION*100)+'%';
    m.title=kf.time.toFixed(1)+'s';
    m.dataset.id=kf.id;
    m.classList.toggle('selected',selectedKF===kf.id);
    m.addEventListener('click',e=>{
      e.stopPropagation();
      selectedKF=kf.id;
      renderKFMarkers();
      seekTo(kf.time);
    });
    // Drag keyframe in time
    let dg=false,startX=0,startT=0;
    m.addEventListener('mousedown',e=>{
      dg=true;startX=e.clientX;startT=kf.time;
      e.stopPropagation();
    });
    window.addEventListener('mousemove',e=>{
      if(!dg)return;
      const dx=e.clientX-startX;
      const newT=Math.max(0,Math.min(DURATION,startT+dx/track.offsetWidth*DURATION));
      kf.time=parseFloat(newT.toFixed(2));
      m.style.left=(kf.time/DURATION*100)+'%';
      m.title=kf.time.toFixed(1)+'s';
    });
    window.addEventListener('mouseup',()=>dg=false);
    track.appendChild(m);
  });
  document.getElementById('kf-count').textContent=keyframes.length+' keyframe'+(keyframes.length!==1?'s':'');
}

function seekTo(t){
  currentTime=Math.max(0,Math.min(DURATION,t));
  document.getElementById('tl-playhead').style.left=(currentTime/DURATION*100)+'%';
  document.getElementById('tl-fill').style.width=(currentTime/DURATION*100)+'%';
  document.getElementById('time-display').textContent=currentTime.toFixed(1)+'s';
  if(keyframes.length>=2) applyState(stateAtTime(currentTime));
}

track.addEventListener('click',e=>{
  const rect=track.getBoundingClientRect();
  seekTo((e.clientX-rect.left)/rect.width*DURATION);
});

// ═══════════════════════════════════════════════
// KEYFRAME ACTIONS
// ═══════════════════════════════════════════════
function addKeyframe(){
  const kf={id:kfIdCounter++,time:currentTime,state:captureState()};
  // Replace if there's one very close
  const existing=keyframes.find(k=>Math.abs(k.time-currentTime)<0.15);
  if(existing){existing.state=captureState();}else{keyframes.push(kf);}
  selectedKF=(existing??kf).id;
  renderKFMarkers();
}
function deleteKeyframe(){
  if(selectedKF===null)return;
  keyframes=keyframes.filter(k=>k.id!==selectedKF);
  selectedKF=null;
  renderKFMarkers();
}
function prevKeyframe(){
  const sorted=[...keyframes].sort((a,b)=>a.time-b.time);
  const prev=sorted.filter(k=>k.time<currentTime-0.05).pop();
  if(prev){selectedKF=prev.id;seekTo(prev.time);renderKFMarkers();}
}
function nextKeyframe(){
  const sorted=[...keyframes].sort((a,b)=>a.time-b.time);
  const nxt=sorted.find(k=>k.time>currentTime+0.05);
  if(nxt){selectedKF=nxt.id;seekTo(nxt.time);renderKFMarkers();}
}
function togglePlay(){
  playing=!playing;
  document.getElementById('btn-play').textContent=playing?'⏸ PAUSE':'► PLAY';
  if(playing){
    if(currentTime>=DURATION) seekTo(0);
    playWallStart=performance.now();
    playTimeStart=currentTime;
  }
}
function stopPlayback(){
  playing=false;
  document.getElementById('btn-play').textContent='► PLAY';
  seekTo(0);
}

// ═══════════════════════════════════════════════
// EXPORT JSON
// ═══════════════════════════════════════════════
function copyJSON(){
  const sorted=[...keyframes].sort((a,b)=>a.time-b.time);
  const out={
    tool:'EC Keyframe Tool',
    duration:DURATION,
    keyframes:sorted.map((kf,i)=>({
      index:i+1,
      time_sec:kf.time,
      camTilt_deg:Math.round(kf.state.camTilt*180/Math.PI),
      camZoom:parseFloat(kf.state.camZoom.toFixed(2)),
      camAngle_deg:Math.round(((kf.state.camAngle%(2*Math.PI))*180/Math.PI+360)%360),
      offsetX:Math.round(kf.state.offsetX),
      offsetY:Math.round(kf.state.offsetY),
      innerRingOffset_deg:Math.round(kf.state.inner*180/Math.PI),
      middleRingOffset_deg:Math.round(kf.state.middle*180/Math.PI),
      outerRingOffset_deg:Math.round(kf.state.outer*180/Math.PI),
    }))
  };
  const txt=JSON.stringify(out,null,2);
  navigator.clipboard.writeText(txt).then(()=>{
    const btn=document.getElementById('btn-copy');
    btn.textContent='✓ Copied!';
    setTimeout(()=>btn.textContent='📋 Copy Animation JSON',2000);
  });
}

// ═══════════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════════
function tick(ts){
  if(!startTime){startTime=ts;resize();buildRuler();}
  const elapsed=ts-startTime;

  // Advance playing timeline
  if(playing && keyframes.length>=2){
    const wallElapsed=(ts-playWallStart)/1000;
    const t=playTimeStart+wallElapsed;
    if(t>=DURATION){playing=false;document.getElementById('btn-play').textContent='► PLAY';seekTo(DURATION);}
    else{seekTo(t);applyState(stateAtTime(t));}
  }

  // Advance orbit angles (respecting pause)
  SVCS.forEach((s,i)=>{
    const rs=RING_STATE[s.orbit];
    if(!rs.paused){
      angles[i]=s.angle*Math.PI/180+(elapsed/ORB[s.orbit].period)*2*Math.PI+rs.extraOffset;
    } else {
      angles[i]=s.angle*Math.PI/180+rs.extraOffset;
    }
  });

  cosT=Math.cos(V.camTilt);
  sinT=Math.sin(V.camTilt);

  drawRings();
  positionNodes();
  requestAnimationFrame(tick);
}

requestAnimationFrame(tick);
</script>
